<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economy Insider | Data Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-card { animation: slideUp 0.6s ease-out forwards; }
    </style>
</head>
<body class="bg-[#fbfcfd] text-slate-900">
    <header class="fixed top-0 left-0 w-full flex justify-between items-center px-8 h-16 bg-white/80 backdrop-blur-xl z-50 border-b border-slate-100">
        <div class="flex items-center gap-2">
            <span class="text-xl font-black tracking-tighter text-slate-900">ECONOMY <span class="text-blue-600">INSIDER</span></span>
        </div>
        <div class="text-right">
            <p class="text-[10px] font-bold text-slate-300 uppercase tracking-widest">Last Update</p>
            <p class="text-xs font-mono text-slate-500">{{UPDATE_TIME}}</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto pt-32 px-8 pb-24">
        <div class="mb-12">
            <nav class="flex items-center gap-2 text-slate-400 text-[10px] uppercase font-bold tracking-widest mb-2">
                <span>Analysis</span> <i data-lucide="chevron-right" class="w-3 h-3"></i> <span>Sovereign Metrics</span>
            </nav>
            <h1 class="text-4xl font-black text-slate-900 tracking-tight">Macro Intelligence Dashboard</h1>
        </div>

        <div id="metrics-container">
            {{ALL_CARDS_HTML}}
        </div>
    </main>

    <footer class="text-center py-20 border-t border-slate-100 text-slate-400 text-[10px] uppercase tracking-[0.2em]">
        &copy; 2026 Bjarne Yang | AI-Powered Macro Intelligence Engine
    </footer>

    <script>
        lucide.createIcons();
        // 这里后续可以由 Python 注入各指标的 Chart.js 初始化代码
        {{CHART_SCRIPTS}}
    </script>
</body>
</html>
